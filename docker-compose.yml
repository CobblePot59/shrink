version: '3'

services:
  app:
    build: BUILD
    image: shrink
    container_name: shrink
    restart: always
    volumes: 
      - ./volumes/app:/opt/shrink
    environment:
      - URL=http://shrink.cobblepot59.int/
  rp:
    image: nginx:alpine
    container_name: shrink-rp
    restart: always
    ports:
       - "80:80"
      #- "443:443"
    volumes:
      - ./volumes/rp/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      #- ./volumes/rp/ssl/shrink.cobblepot59.int.crt:/etc/ssl/certs/shrink.cobblepot59.int.crt:ro
      #- ./volumes/rp/ssl/shrink.cobblepot59.int.key:/etc/ssl/private/shrink.cobblepot59.int.key:ro
    environment:
      - NGINX_HOST=shrink.cobblepot59.int
